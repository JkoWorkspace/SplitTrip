<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi cuenta — SplitTrip</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <div class="brand-icon">
          <img src="logo-bear-dark.png" alt="SplitTrip" style="width:32px;height:32px;object-fit:contain;filter:invert(1);">
        </div>
        <div class="brand-name">
          SplitTrip
          <span>Divide · Viaja · Disfruta</span>
        </div>
      </a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link fw-semibold" href="dashboard.html">Mi dashboard</a></li>
          <li class="nav-item">
            <button class="btn btn-outline-danger btn-sm px-3" id="btnCerrarSesion">Cerrar sesión</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Encabezado -->
  <div class="dashboard-saludo py-4">
    <div class="container">
      <h2 class="fw-bold mb-0">Mi cuenta 👤</h2>
      <p class="text-muted mb-0 mt-1">Administra tu información personal</p>
    </div>
  </div>

  <main class="py-4">
    <div class="container">
      <div class="row g-4">

        <!-- Perfil header -->
        <div class="col-12">
          <div class="cuenta-perfil-header">
            <div class="cuenta-avatar" id="avatarInicial">?</div>
            <div>
              <p class="mb-0 text-white-50 small text-uppercase fw-bold">Cuenta activa</p>
              <p class="mb-0 fw-bold fs-5 text-white" id="perfilNombre">—</p>
              <p class="mb-0 text-white-50 small" id="perfilCorreo">—</p>
            </div>
          </div>
        </div>

        <!-- Estadísticas rápidas -->
        <div class="col-12">
          <div class="row g-3">
            <div class="col-6 col-md-3">
              <div class="card border shadow-sm auth-card text-center p-3">
                <div style="font-size:1.8rem;">✈️</div>
                <p class="fw-bold fs-4 mb-0 mt-1" id="statViajes" style="color:var(--color-primary)">—</p>
                <p class="text-muted small mb-0">Viajes</p>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card border shadow-sm auth-card text-center p-3">
                <div style="font-size:1.8rem;">💸</div>
                <p class="fw-bold fs-4 mb-0 mt-1" id="statGastos" style="color:var(--color-primary)">—</p>
                <p class="text-muted small mb-0">Gastos pagados</p>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card border shadow-sm auth-card text-center p-3">
                <div style="font-size:1.8rem;">👥</div>
                <p class="fw-bold fs-4 mb-0 mt-1" id="statCompaneros" style="color:var(--color-primary)">—</p>
                <p class="text-muted small mb-0">Compañeros</p>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card border shadow-sm auth-card text-center p-3">
                <div style="font-size:1.8rem;">📅</div>
                <p class="fw-bold fs-4 mb-0 mt-1" id="statMiembro" style="color:var(--color-primary)">—</p>
                <p class="text-muted small mb-0">Miembro desde</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Editar información -->
        <div class="col-12 col-lg-6">
          <div class="card border shadow-sm auth-card h-100">
            <div class="card-body p-4">

              <h5 class="fw-bold mb-4" style="color:var(--color-primary-dark)">✏️ Editar información</h5>

              <form id="formEditarPerfil" novalidate>

                <div class="mb-3">
                  <label for="editNombre" class="form-label fw-semibold">Nombre completo</label>
                  <input
                    type="text"
                    class="form-control input-dark"
                    id="editNombre"
                    maxlength="100"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label for="editCorreo" class="form-label fw-semibold">Correo electrónico</label>
                  <input
                    type="email"
                    class="form-control input-dark"
                    id="editCorreo"
                    maxlength="150"
                    required
                  >
                </div>

                <div class="mb-4">
                  <label for="editTelefono" class="form-label fw-semibold">
                    Teléfono <span class="text-muted fw-normal">(opcional)</span>
                  </label>
                  <input
                    type="tel"
                    class="form-control input-dark"
                    id="editTelefono"
                    maxlength="20"
                  >
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btnGuardarPerfil">
                  Guardar cambios
                </button>

              </form>

              <div id="mensajePerfil" class="mt-3"></div>

            </div>
          </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="col-12 col-lg-6">
          <div class="card border shadow-sm auth-card h-100">
            <div class="card-body p-4">

              <h5 class="fw-bold mb-4" style="color:var(--color-primary-dark)">🔒 Cambiar contraseña</h5>

              <form id="formCambiarPassword" novalidate>

                <div class="mb-3">
                  <label for="passwordActual" class="form-label fw-semibold">Contraseña actual</label>
                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control input-dark"
                      id="passwordActual"
                      placeholder="Tu contraseña actual"
                      required
                    >
                    <button class="btn btn-toggle-password" type="button" data-target="passwordActual">👁</button>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="passwordNuevo" class="form-label fw-semibold">Nueva contraseña</label>
                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control input-dark"
                      id="passwordNuevo"
                      placeholder="Mínimo 6 caracteres"
                      required
                      minlength="6"
                    >
                    <button class="btn btn-toggle-password" type="button" data-target="passwordNuevo">👁</button>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="passwordConfirmar" class="form-label fw-semibold">Confirmar nueva contraseña</label>
                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control input-dark"
                      id="passwordConfirmar"
                      placeholder="Repite tu nueva contraseña"
                      required
                    >
                    <button class="btn btn-toggle-password" type="button" data-target="passwordConfirmar">👁</button>
                  </div>
                  <div class="invalid-feedback d-block" id="errorPasswordConfirmar"></div>
                </div>

                <button type="submit" class="btn btn-outline-primary w-100 py-2 fw-bold" id="btnCambiarPassword">
                  Cambiar contraseña
                </button>

              </form>

              <div id="mensajePassword" class="mt-3"></div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer mt-5">
    <div class="footer-bottom text-center py-3">
      © 2026 SplitTrip — Todos los derechos reservados
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica -->
  <script type="module" src="cuenta.js"></script>

</body>
</html>
